<html lang="sv">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="Kontakta oss för frågor om träning, kostplaner och mål.">
</head>
<body>
<header class="fh-navbar">
    <div class="fh-navbar__left">
        <h1 class="fh-navbar__title">
            Fitness<span class="fh-highlight">Hub</span>
        </h1>
    </div>

    <nav class="fh-navbar__menu" id="fhNavMenu">
        <a href="Index.html" class="fh-navbar__link">Home</a>
        <a href="contact.html" class="fh-navbar__link">Contact</a>
        <a href="AboutUs.html" class="fh-navbar__link">About us</a>
    </nav>

    <div class="fh-navbar__right">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M463 448.2C440.9 409.8 399.4 384 352 384L288 384C240.6 384 199.1 409.8 177 448.2C212.2 487.4 263.2 512 320 512C376.8 512 427.8 487.3 463 448.2zM64 320C64 178.6 178.6 64 320 64C461.4 64 576 178.6 576 320C576 461.4 461.4 576 320 576C178.6 576 64 461.4 64 320zM320 336C359.8 336 392 303.8 392 264C392 224.2 359.8 192 320 192C280.2 192 248 224.2 248 264C248 303.8 280.2 336 320 336z"/></svg>        <button class="fh-navbar__login-btn">Logga in</button>
    </div>

    <div class="fh-navbar__hamburger" id="fhHamburger">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
            <path d="M64 160C64 142.3 78.3 128 96 128L480 128C497.7 128 512 142.3 512 160C512 177.7 497.7 192 480 192L96 192C78.3 192 64 177.7 64 160zM128 320C128 302.3 142.3 288 160 288L544 288C561.7 288 576 302.3 576 320C576 337.7 561.7 352 544 352L160 352C142.3 352 128 337.7 128 320zM512 480C512 497.7 497.7 512 480 512L96 512C78.3 512 64 497.7 64 480C64 462.3 78.3 448 96 448L480 448C497.7 448 512 462.3 512 480z"/>
        </svg>
    </div>
</header>

    <main class="center-container">
        <section class="workout-card contact-card">
            <h1 class="title">Kontakta oss</h1>
            <p>Vi hjälper dig gärna med frågor om träning och kost</p>
            <form class="contact-form" method="POST" action="#">
                <div class="form-group">
                    <label for="name">Namn</label>
                    <input type="text" id="name" name="name" placeholder="Namn" required minlength="2" pattern="[A-Za-zÅÄÖåäö\s]+">
                </div>

                <div class="form-group">
                    <label for="email">E-post</label>
                    <input type="email" id="email" name="email" placeholder="e-post" required>
                </div>

                <div class="form-group">
                    <label for="phone">Telefon</label>
                    <input type="tel" id="phone" name="phone" placeholder="Telefonnummer (Valfritt)" pattern="^\+?\d{7,15}$">
                </div>

                <div class="form-group">
                    <label for="message">Meddelande</label>
                    <textarea id="message" name="message" required></textarea>
                </div>

                <button class="btn submit-btn" type="submit">Skicka meddelande</button>

                <p class="contact-footer">
                Svar inom 24 timmar • Säker och konfidentiell
                </p>
            </form>
        </section>
    </main>

    <div class="loginModal" id="loginModal">
    <div class="modalContent">
        <h3>Logga in</h3>

        <input type="text" id="loginUser" placeholder="Användarnamn" required minlength="" pattern="[A-Za-zÅÄÖåäö\s]+">
        <input type="password" id="loginPass" placeholder="Lösenord" required minlength="6">

        <div class="modalButtons">
            <button id="loginCancel">Avbryt</button>
            <button id="loginSubmit">Logga in</button>
        </div>

        <p class="loginInfo">Inget konto? Skapas automatiskt vid första inloggningen.</p>
    </div>
</div>
<script src="index.js"></script>
</body>
</html>
