<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakta oss - Fitness</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Kontakta oss för frågor om träning, kostplaner och mål.">
</head>
<body>
    <main class="center-container">
        <section class="workout-card contact-card">
            <h1 class="title">Kontakta oss</h1>
            <form class="contact-form" method="POST" action="#">
                <div class="form-group">
                    <label for="name">Namn</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">E-post</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Telefon</label>
                    <input type="tel" id="phone" name="phone">
                </div>

                <div class="form-group">
                    <label for="message">Meddelande</label>
                    <textarea id="message" name="message" required></textarea>
                </div>

                <button class="btn submit-btn" type="submit">Skicka meddelande</button>
            </form>
        </section>
    </main>
</body>
</html>
